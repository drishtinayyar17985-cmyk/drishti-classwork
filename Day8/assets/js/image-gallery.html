<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .img {

            height: 250px;
            object-fit: contain;
            
        }

        .grid-image {
            border: 3px solid black;
            text-align: center;
            
        }

        .grid-image:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <script src="assets/js/img.js"></script>
</body>

</html>
